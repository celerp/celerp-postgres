name: Publish to PyPI

# Triggers: PRs validate changes; tags release. (No plain-main trigger — it
# duplicated every tag run and starved the runner queue.)
on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build wheel setuptools check-wheel-contents rpmfile zstandard patchelf
      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "$TAG" = "$PKG" ] || { echo "Version mismatch: tag=$TAG pkg=$PKG"; exit 1; }
      - name: Build all platform wheels (download + pinned-sha256 verify + repackage)
        run: python scripts/build_wheels.py --all
      - name: Validate wheel contents
        # W002 = duplicates (materialized .so symlinks); W004 = "module not at
        # importable path" (PG's own .so plugins are data, not Python modules).
        run: check-wheel-contents --ignore W002,W004 dist/*.whl
      - uses: actions/upload-artifact@v4
        with: { name: wheels, path: dist/*.whl }

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    pick: manylinux_2_34_x86_64 }
          - { os: ubuntu-24.04-arm, pick: manylinux_2_34_aarch64 }
          - { os: macos-latest,     pick: macosx_26_0_arm64 }
          # TODO(restore): windows job removed 2026-07-09 — GitHub's windows
          # pool cancelled it 6x ("not acquired by runner"), and that
          # cancellation is RUN-level, so even continue-on-error couldn't
          # shield publish. The win wheel was proven end-to-end on real
          # Windows that day (initdb, server, psql, dump/restore, clean stop).
          # Re-add when the pool is reliable:
          #   - { os: windows-latest, pick: win_amd64 }
          # No macos x86_64 runtime job: the binaries target macOS 26+, and
          # GitHub's only Intel runners stop at macOS 13. The x64 wheel is
          # structurally identical (same build path) and tagged honestly.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { name: wheels, path: dist }
      - name: Install this platform's wheel + run the full suite
        shell: bash
        run: |
          pip install pytest dist/*${{ matrix.pick }}*.whl
          pytest tests/ -q
      - name: Assert macOS min-version <= wheel tag
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          BIN=$(python -c "import celerp_postgres;print(celerp_postgres.tool('postgres'))")
          otool -l "$BIN" | grep -B1 -A4 'LC_BUILD_VERSION\|LC_VERSION_MIN_MACOSX' || true
          MINOS=$(otool -l "$BIN" | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; exit}')
          [ -n "$MINOS" ] || MINOS=$(otool -l "$BIN" | awk '/LC_VERSION_MIN_MACOSX/{f=1} f && /version /{print $2; exit}')
          echo "binary minos=$MINOS wheel tag=${{ matrix.pick }}"
          TAG_V=$(echo "${{ matrix.pick }}" | sed -E 's/macosx_([0-9]+)_([0-9]+).*/\1.\2/')
          [ -n "$MINOS" ] || { echo "could not parse minos"; exit 1; }
          python - "$MINOS" "$TAG_V" <<'PY'
          import sys
          minos = tuple(map(int, sys.argv[1].split(".")[:2]))
          tag = tuple(map(int, sys.argv[2].split(".")))
          assert minos <= tag, f"binary needs macOS {minos} > wheel tag {tag}"
          PY

  test-musl:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: wheels, path: dist }
      - name: Run the suite inside Alpine against the musllinux wheel
        # Deliberately NO apk packages beyond python: proves the wheel is fully
        # self-contained. initdb refuses root, hence the unprivileged user.
        run: |
          docker run --rm -v "$PWD":/w -w /w python:3.12-alpine sh -c "
            pip install -q pytest dist/*musllinux_1_2_x86_64*.whl &&
            adduser -D tester &&
            su tester -c 'cd /w && pytest tests/ -q'"

  test-slim:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: wheels, path: dist }
      - name: Run the suite inside debian-slim (no system packages) — the
              zero-setup acceptance gate for the manylinux wheel
        run: |
          docker run --rm -v "$PWD":/w -w /w python:3.12-slim bash -c "
            pip install -q pytest dist/*manylinux_2_34_x86_64*.whl &&
            useradd -m tester &&
            su tester -c 'cd /w && pytest tests/ -q'"

  publish:
    needs: [test, test-musl, test-slim]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing — no API key anywhere
    steps:
      - uses: actions/download-artifact@v4
        with: { name: wheels, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
